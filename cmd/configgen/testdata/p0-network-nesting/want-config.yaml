version: "2"
distro_name: test
apis:
  - inference
providers:
  inference:
    - provider_id: remote-vllm
      provider_type: remote::vllm
      config:
        base_url: https://vllm.example.com:8000
        network:
          tls:
            verify: false
            min_version: TLSv1.3
            ciphers:
              - ECDHE+AESGCM
          proxy:
            url: http://proxy.example.com:3128
            no_proxy:
              - localhost
              - .internal
          timeout:
            connect: 30
            read: 120
          headers:
            X-Custom: my-value
registered_resources: {}
server:
  port: 8321
