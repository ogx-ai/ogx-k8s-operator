apiVersion: ogx.io/v1beta1
kind: OGXServer
metadata:
  name: test-p0-network-nesting
spec:
  distribution:
    name: test
  providers:
    inference:
      remote:
        vllm:
        - endpoint: https://vllm.example.com:8000
          network:
            tls:
              verify: false
              minVersion: TLSv1.3
              ciphers:
              - ECDHE+AESGCM
            proxy:
              url: http://proxy.example.com:3128
              noProxy:
              - localhost
              - .internal
            timeout:
              connect: 30
              read: 120
            headers:
              X-Custom: my-value
