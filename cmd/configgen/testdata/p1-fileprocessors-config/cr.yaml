apiVersion: ogx.io/v1beta1
kind: OGXServer
metadata:
  name: test-p1-fileprocessors-config
spec:
  distribution:
    name: test
  providers:
    fileProcessors:
      remote:
        doclingServe:
          baseUrl: "http://docling.example.com:5001/v1"
          apiKey:
            name: docling-secret
            key: api-key
          defaultChunkSizeTokens: 2048
      inline:
        auto:
          defaultChunkSizeTokens: 1000
          defaultChunkOverlapTokens: 500
          extractMetadata: true
          cleanText: false
        pypdf:
          defaultChunkSizeTokens: 600
          defaultChunkOverlapTokens: 200
          extractMetadata: false
          cleanText: true
        markitdown:
          defaultChunkSizeTokens: 900
          defaultChunkOverlapTokens: 300
        docling:
          defaultChunkSizeTokens: 1200
          defaultChunkOverlapTokens: 100
          doOcr: false
