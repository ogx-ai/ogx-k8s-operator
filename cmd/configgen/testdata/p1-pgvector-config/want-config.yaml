version: "2"
distro_name: test
apis:
  - vector_io
providers:
  vector_io:
    - provider_id: remote-pgvector
      provider_type: remote::pgvector
      config:
        host: pgvector.example.com
        port: 5432
        db: vectors
        user: pguser
        password: ${env.OGX_REMOTE_PGVECTOR_PASSWORD}
        distance_metric: COSINE
        vector_index:
          hnsw:
            m: 16
            ef_construction: 200
            ef_search: 100
registered_resources: {}
server:
  port: 8321
